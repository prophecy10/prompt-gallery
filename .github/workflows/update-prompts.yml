name: Update Prompts from Google Sheet

on:
  # Run manually from GitHub Actions tab
  workflow_dispatch:
  # Or run every hour automatically
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch sheet and rebuild prompts.json
        env:
          SHEET_CSV_URL: ${{ secrets.GOOGLE_SHEET_CSV_URL }}
        run: node scripts/build-prompts.js

      - name: Generate sitemap
        run: node scripts/generate-sitemap.js

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prompts.json sitemap.xml
          git diff --staged --quiet || git commit -m "Update prompts from Google Sheet"
          git push
