<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prompt Gallery — Curated AI Image Prompts</title>
    <meta name="description" content="Browse and copy curated AI image generation prompts. Free gallery of prompts for Gemini, Midjourney, DALL-E and more.">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- Header -->
    <header class="site-header">
        <div class="header-inner">
            <div class="logo">
                <span class="logo-icon">🎨</span>
                <span class="logo-text">Prompt Gallery</span>
            </div>
            <div class="header-actions">
                <button class="icon-btn theme-toggle-btn" id="theme-toggle" aria-label="Toggle theme">
                    <svg class="icon-sun" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="icon-moon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </button>
                <button class="icon-btn favorites-nav-btn" id="favorites-toggle" aria-label="View favorites">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                    </svg>
                    <span class="fav-count" id="fav-count">0</span>
                </button>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
        <!-- Category Filters -->
        <div class="filters-bar">
            <div class="filters-inner">
                <button class="filter-pill active" data-category="all">All</button>
                <button class="filter-pill" data-category="men">Men</button>
                <button class="filter-pill" data-category="women">Women</button>
                <button class="filter-pill" data-category="kids">Kids</button>
                <button class="filter-pill" data-category="family">Family</button>
            </div>
        </div>

        <!-- Gallery Grid -->
        <div class="gallery-grid" id="gallery-grid">
            <!-- Cards injected by JS -->
        </div>

        <!-- Empty State -->
        <div class="empty-state hidden" id="empty-state">
            <span class="empty-icon">📭</span>
            <h3>No prompts found</h3>
            <p>Try selecting a different category</p>
        </div>

        <!-- Loading State -->
        <div class="loading-state" id="loading-state">
            <div class="spinner"></div>
            <p>Loading prompts...</p>
        </div>
    </main>

    <!-- Prompt Detail Modal -->
    <div class="modal-overlay" id="detail-modal">
        <div class="modal-container">
            <button class="modal-close" id="modal-close" aria-label="Close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            <div class="modal-body">
                <div class="modal-image-wrap">
                    <img src="" alt="AI Generated Image" class="modal-image" id="modal-image">
                </div>
                <div class="modal-info">
                    <div class="modal-category" id="modal-category"></div>
                    <h3 class="modal-section-title">Prompt</h3>
                    <p class="modal-prompt-text" id="modal-prompt"></p>
                    <div class="modal-actions">
                        <button class="btn btn-primary" id="modal-copy-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
                            </svg>
                            Copy Prompt
                        </button>
                        <button class="btn btn-secondary" id="modal-fav-btn">
                            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                            </svg>
                            <span id="modal-fav-text">Favorite</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Favorites Panel (slide-in) -->
    <div class="favorites-panel" id="favorites-panel">
        <div class="panel-header">
            <h2>❤️ Favorites</h2>
            <button class="icon-btn" id="close-favorites" aria-label="Close favorites">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div class="panel-body" id="favorites-list">
            <!-- Favorites injected by JS -->
        </div>
        <div class="panel-empty hidden" id="favorites-empty">
            <span>💔</span>
            <p>No favorites yet. Tap the heart on any prompt to save it here.</p>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast">
        <span class="toast-icon">✓</span>
        <span class="toast-message" id="toast-message">Copied!</span>
    </div>

    <!-- Footer -->
    <footer class="site-footer">
        <div class="footer-inner">
            <p>Made with ❤️ for AI Artists</p>
            <img src="https://visitor-badge.laobi.icu/badge?page_id=prompt-gallery-site" alt="Visitors" class="visitor-badge">
        </div>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
